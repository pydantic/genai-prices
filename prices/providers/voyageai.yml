# yaml-language-server: $schema=.schema.json
name: Voyage AI
id: voyageai
pricing_urls:
  - https://docs.voyageai.com/docs/pricing
api_pattern: 'https://api\.voyageai\.com'
model_match:
  starts_with: "voyage-"
provider_match:
  contains: voyage
price_comments: >-
  Voyage AI bills per input token only; embedding models produce vectors rather than completion tokens, so there
  is no output price. The Batch API offers a 33% discount. This file covers text embedding models only; rerankers
  and multimodal embedding models are not included.

models:
  - id: voyage-01
    name: Voyage 01
    match:
      equals: voyage-01
    deprecated: true
    prices_checked: 2026-06-18
    prices:
      input_mtok: 0.1

  - id: voyage-2
    name: Voyage 2
    match:
      or:
        - equals: voyage-2
        - equals: voyage-02
    deprecated: true
    prices_checked: 2026-06-18
    prices:
      input_mtok: 0.1

  - id: voyage-3
    name: Voyage 3
    description: >-
      General-purpose text embedding model optimized for retrieval quality and cost.
