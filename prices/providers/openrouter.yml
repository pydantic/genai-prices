# yaml-language-server: $schema=.schema.json
name: OpenRouter
id: openrouter
pricing_urls:
  - https://openrouter.ai/models
api_pattern: 'https://(api\.)?openrouter\.ai'
# we don't include description here since there are so many models, you can see descriptions at
# https://openrouter.ai/api/v1/models which this data is based on
extractors:
  # https://openrouter.ai/docs/api-reference/overview#response-usage
  - api_flavor: chat
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
      - path: [prompt_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: [prompt_tokens_details, cache_write_tokens]
        dest: cache_write_tokens
        required: false
      - path: [prompt_tokens_details, audio_tokens]
        dest: input_audio_tokens
        required: false
      - path: [completion_tokens_details, audio_tokens]
        dest: output_audio_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens

