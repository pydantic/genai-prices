# yaml-language-server: $schema=.schema.json
name: Avian
id: avian
pricing_urls:
  - https://avian.io/pricing/
api_pattern: 'https://api\.avian\.io'
price_comments: >-
  Refreshed 2026-07-16 from https://avian.io/pricing/ (issue #322). Avian's current lineup is
  DeepSeek V4/V3.2, GLM-5/5.1, MiniMax M2.5 and Kimi K2.5/K2.6; the Meta Llama models are no
  longer listed on the pricing page and are marked deprecated. The pricing table's "Cache"
  column is mapped to cache_read_mtok. Canonical model ids are the provider-prefixed forms
  from https://avian.io/docs/ and https://avian.io/models/ (e.g. deepseek/deepseek-v3.2);
  the unprefixed forms shown in the homepage example (e.g. DeepSeek-V3.2) are kept as
  match aliases.
models:
  - id: Meta-Llama-3.1-405B-Instruct
    match:
      equals: Meta-Llama-3.1-405B-Instruct
    deprecated: true
    price_comments: No longer listed on https://avian.io/pricing/ as of 2026-07-16.
    prices:
      input_mtok: 1.5
      output_mtok: 1.5

  - id: Meta-Llama-3.1-70B-Instruct
    match:
      equals: Meta-Llama-3.1-70B-Instruct
    deprecated: true
    price_comments: No longer listed on https://avian.io/pricing/ as of 2026-07-16.
    prices:
      input_mtok: 0.45
      output_mtok: 0.45

  - id: Meta-Llama-3.1-8B-Instruct
