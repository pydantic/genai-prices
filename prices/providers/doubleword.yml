# yaml-language-server: $schema=.schema.json
name: Doubleword
id: doubleword
pricing_urls:
  - https://docs.doubleword.ai/inference-api/models
api_pattern: 'https://api\.doubleword\.ai'
price_comments: >-
  Doubleword publishes Realtime, Async, and Batch prices. This provider currently
  encodes only Realtime pricing.
extractors:
  - api_flavor: chat
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
      - path: [prompt_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: [prompt_tokens_details, cache_write_tokens]
        dest: cache_write_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens

  - api_flavor: responses
    root: usage
    mappings:
      - path: input_tokens
        dest: input_tokens
      - path: [input_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: output_tokens
        dest: output_tokens

  - api_flavor: embeddings
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
models:
  # Alibaba models
