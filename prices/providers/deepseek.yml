# yaml-language-server: $schema=.schema.json
name: Deepseek
id: deepseek
pricing_urls:
  - https://api-docs.deepseek.com/quick_start/pricing
api_pattern: 'https://api\.deepseek\.com'
price_comments: >-
  Deepseek off-peak pricing applies "UTC 16:30-00:30" so we switch it around and use the off-peak pricing
  as the default (first) price then the second price with a constraint is the "standard" pricing
  that applies "UTC 00:30-16:30".
model_match:
  contains: deepseek

extractors:
  # assuming this API matches OpenAI
  - api_flavor: chat
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
      - path: [prompt_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: [completion_tokens_details, audio_tokens]
        dest: output_audio_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens

models:
  - id: deepseek-chat
    name: DeepSeek Chat
    description: >-
      DeepSeek-V3 is the latest model from the DeepSeek team, building upon the instruction following and coding abilities
      of the previous versions. Pre-trained on nearly 15 trillion tokens, the reported
      evaluations reveal that the model outperforms other open-source models and rivals leading closed-source models.
    match:
      or:
        - starts_with: deepseek-chat
        - equals: deepseek-chat-v3-0324
    context_window: 64000
    prices_checked: 2025-07-12
    prices:
      - prices:
          input_mtok: 0.135
          cache_read_mtok: 0.035
          output_mtok: 0.550
      - constraint:
          start_time: 00:30:00Z
          end_time: 16:30:00Z
        prices:
          input_mtok: 0.27
          cache_read_mtok: 0.07
          output_mtok: 1.1

  - id: deepseek-reasoner
    name: Deepseek R1
    description: >-
      DeepSeek R1 is here: Performance on par with OpenAI o1, but open-sourced and with fully open reasoning tokens. It's
      671B parameters in size, with 37B active in an inference pass.
    match:
      or:
        - equals: deepseek-reasoner
        - starts_with: deepseek-r1
        - equals: deepseek-r1-0528
    context_window: 64000
    prices_checked: 2025-07-12
    prices:
      - prices:
          input_mtok: 0.135
          cache_read_mtok: 0.035
          output_mtok: 0.550
      - constraint:
          start_time: 00:30:00Z
          end_time: 16:30:00Z
        prices:
          input_mtok: 0.55
          cache_read_mtok: 0.14
          output_mtok: 2.19

  - id: deepseek-v3.1-terminus
    name: DeepSeek V3.1 Terminus
    description: >-
      DeepSeek-V3.1 Terminus is an update to DeepSeek V3.1 that maintains the model's original capabilities while addressing
      issues reported by users, including language consistency and agent capabilities.
    match:
      equals: deepseek-v3.1-terminus
    prices_checked: 2026-06-09
    prices:
      input_mtok: 0.27
      cache_read_mtok: 0.13
      output_mtok: 0.95

  - id: deepseek-v3.2
    name: DeepSeek V3.2
    description: >-
      DeepSeek-V3.2 is a large language model designed to harmonize high computational efficiency with strong reasoning and
      agentic tool-use performance.
    match:
      equals: deepseek-v3.2
    prices_checked: 2026-06-09
    prices:
      input_mtok: 0.2288
      output_mtok: 0.3432

  - id: deepseek-v3.2-exp
    name: DeepSeek V3.2 Exp
    description: >-
      DeepSeek-V3.2-Exp is an experimental large language model released by DeepSeek as an intermediate step between V3.1
      and future architectures.
    match:
      equals: deepseek-v3.2-exp
    prices_checked: 2026-06-09
    prices:
      input_mtok: 0.27
      output_mtok: 0.41

  - id: deepseek-v4-flash
    name: DeepSeek V4 Flash
    description: >-
      DeepSeek-V4-Flash. Supports both non-thinking and thinking (default) modes, JSON output, tool calls,
      chat prefix completion, and FIM completion (non-thinking only).
    match:
      or:
        - starts_with: deepseek-v4-flash
    context_window: 1000000
    prices_checked: 2026-05-12
    prices:
      input_mtok: 0.14
      cache_read_mtok: 0.0028
      output_mtok: 0.28

  - id: deepseek-v4-pro
    name: DeepSeek V4 Pro
    description: >-
      DeepSeek-V4-Pro. Supports both non-thinking and thinking (default) modes, JSON output, tool calls,
      chat prefix completion, and FIM completion (non-thinking only).
    match:
      or:
        - starts_with: deepseek-v4-pro
    context_window: 1000000
    prices_checked: 2026-06-02
    prices:
      input_mtok: 0.435
      cache_read_mtok: 0.003625
      output_mtok: 0.87
