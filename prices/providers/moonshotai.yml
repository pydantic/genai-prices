# yaml-language-server: $schema=.schema.json
name: MoonshotAi
id: moonshotai
pricing_urls:
  - https://platform.moonshot.ai/docs/pricing/chat#product-pricing
api_pattern: 'https://api\.moonshot\.'
model_match:
  or:
    - starts_with: "kimi"
    - starts_with: "moonshot"
provider_match:
  contains: moonshot
extractors:
  - api_flavor: chat
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
      - path: [prompt_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens

models:
  - id: kimi-k2
    name: Kimi K2 0711
    description: >-
      Kimi K2 Instruct is a large-scale Mixture-of-Experts (MoE) language model developed by Moonshot AI, featuring 1 trillion
      total parameters with 32 billion active per forward pass.
    match:
      equals: kimi-k2
    prices_checked: 2026-06-09
    prices:
      input_mtok: 0.57
      output_mtok: 2.3

  - id: kimi-k2-0711-preview
    name: Kimi K2 0711 Preview
    description: >-
      MoE foundation model with exceptional coding and agent capabilities, featuring 1 trillion total parameters
      and 32 billion activated parameters.
    match:
      equals: kimi-k2-0711-preview
    context_window: 131072
    prices_checked: 2026-03-11
    prices:
      input_mtok: 0.60
      cache_read_mtok: 0.15
      output_mtok: 2.50

  - id: kimi-k2-0905-preview
    name: Kimi K2 0905 Preview
    description: >-
      Based on kimi-k2-0711-preview, with enhanced agentic coding abilities, improved frontend code quality
      and practicality, and better context understanding. MoE foundation model with 1 trillion total parameters
      and 32 billion activated parameters.
    match:
      equals: kimi-k2-0905-preview
    context_window: 262144
    prices_checked: 2026-03-11
    prices:
      input_mtok: 0.60
      cache_read_mtok: 0.15
      output_mtok: 2.50

  - id: kimi-k2-thinking
    name: Kimi K2 Thinking
    description: >-
      A thinking model with general agentic and reasoning capabilities, specializing in deep reasoning tasks.
    match:
      equals: kimi-k2-thinking
    context_window: 262144
    prices_checked: 2026-03-11
    prices:
      input_mtok: 0.60
      cache_read_mtok: 0.15
      output_mtok: 2.50

  - id: kimi-k2-thinking-turbo
    name: Kimi K2 Thinking Turbo
    description: >-
      High-speed version of kimi-k2-thinking, suitable for scenarios requiring both deep reasoning
      and extremely fast responses.
    match:
      equals: kimi-k2-thinking-turbo
    context_window: 262144
    prices_checked: 2026-03-11
    prices:
      input_mtok: 1.15
      cache_read_mtok: 0.15
      output_mtok: 8.00

  - id: kimi-k2-turbo-preview
    name: Kimi K2 Turbo Preview
    description: >-
      High-speed version of kimi-k2, always aligned with the latest kimi-k2. Same model parameters as kimi-k2,
      output speed up to 60 tokens/sec (max 100 tokens/sec).
    match:
      starts_with: kimi-k2-turbo
    context_window: 262144
    prices_checked: 2026-03-11
    prices:
      input_mtok: 1.15
      cache_read_mtok: 0.15
      output_mtok: 8.00

  - id: kimi-k2.5
    name: Kimi K2.5
    description: >-
      Kimi's most versatile model featuring a native multimodal architecture that supports both visual and text input,
      thinking and non-thinking modes, and dialogue and agent tasks. Supports automatic context caching, ToolCalls,
      JSON Mode, Partial Mode, and internet search.
    match:
      starts_with: kimi-k2.5
    context_window: 262144
    prices_checked: 2026-03-11
    prices:
      input_mtok: 0.60
      cache_read_mtok: 0.10
      output_mtok: 3.00

  - id: kimi-k2.6
    name: Kimi K2.6
    description: >-
      Kimi's most capable model with enhanced long-context coding stability, improved instruction compliance and
      self-correction capabilities. Native multimodal architecture supporting text, image, and video input, thinking
      and non-thinking modes, and agent tasks. Supports automatic context caching, ToolCalls, JSON Mode, Partial Mode,
      and internet search.
    match:
      starts_with: kimi-k2.6
    context_window: 262144
    prices_checked: "2026-05-22"
    prices:
      input_mtok: 0.95
      cache_read_mtok: 0.16
      output_mtok: 4.00

  - id: kimi-k2.7-code
    name: Kimi K2.7 Code
    description: >-
      Kimi's most intelligent coding model, capable of completing programming tasks with higher success rates in long
      context. It features a native multimodal architecture that supports text, image, video input, thinking modes,
      dialogue, and agent tasks.
    match:
      equals: kimi-k2.7-code
    context_window: 262144
    prices_checked: "2026-06-15"
    price_comments: "Ref: https://platform.kimi.ai/docs/pricing/chat-k27-code.md"
    prices:
      input_mtok: 0.95
      cache_read_mtok: 0.19
      output_mtok: 4.00

  - id: kimi-k3
    name: Kimi K3
    description: >-
      Kimi's flagship reasoning model with always-on thinking, native multimodal (image and video) input,
      tool use, and structured output. 2.8 trillion total parameters MoE.
    match:
      equals: kimi-k3
    context_window: 1048576
    prices_checked: "2026-07-16"
    prices:
      input_mtok: 3.00
      cache_read_mtok: 0.30
      output_mtok: 15.00

  - id: moonshot-v1-128k
    name: Moonshot V1 128K
    match:
      or:
        - equals: moonshot-v1-128k
        - equals: moonshot-v1-128k-vision-preview
    context_window: 131072
    prices_checked: 2026-03-11
    prices:
      input_mtok: 2.00
      output_mtok: 5.00

  - id: moonshot-v1-32k
    name: Moonshot V1 32K
    match:
      or:
        - equals: moonshot-v1-32k
        - equals: moonshot-v1-32k-vision-preview
    context_window: 32768
    prices_checked: 2026-03-11
    prices:
      input_mtok: 1.00
      output_mtok: 3.00

  - id: moonshot-v1-8k
    name: Moonshot V1 8K
    match:
      or:
        - equals: moonshot-v1-8k
        - equals: moonshot-v1-8k-vision-preview
    context_window: 8192
    prices_checked: 2026-03-11
    prices:
      input_mtok: 0.20
      output_mtok: 2.00
