# yaml-language-server: $schema=.schema.json
# This provider is manually maintained. The huggingface_* provider files are generated by source_huggingface.py.
id: huggingface
name: HuggingFace
pricing_urls:
  - https://huggingface.co/docs/inference-providers/en/index
api_pattern: https://router\.huggingface\.co/v1
provider_match:
  equals: huggingface
extractors:
  - root: usage
    model_path: model
    mappings:
      - path: prompt_tokens
        dest: input_tokens
        required: true
      - path:
          - prompt_tokens_details
          - cached_tokens
        dest: cache_read_tokens
        required: false
      - path:
          - prompt_tokens_details
          - audio_tokens
        dest: input_audio_tokens
        required: false
      - path:
          - completion_tokens_details
          - audio_tokens
        dest: output_audio_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens
        required: true
  - api_flavor: chat
    root: usage
    model_path: model
    mappings:
      - path: prompt_tokens
        dest: input_tokens
        required: true
      - path:
          - prompt_tokens_details
          - cached_tokens
        dest: cache_read_tokens
        required: false
      - path:
          - prompt_tokens_details
          - audio_tokens
        dest: input_audio_tokens
        required: false
      - path:
          - completion_tokens_details
          - audio_tokens
        dest: output_audio_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens
        required: true
models: []
