# yaml-language-server: $schema=.schema.json
name: Zhipu AI
id: zhipuai
pricing_urls:
  - https://open.bigmodel.cn/pricing
  - https://docs.bigmodel.cn/cn/guide/start/model-overview
api_pattern: 'https://open\.bigmodel\.cn'
price_comments: >-
  Prices sourced from Zhipu AI open platform pricing (CNY, open.bigmodel.cn/pricing),
  converted to USD at 1 USD = 7.25 CNY (May 2026). Zhipu AI does not publish USD
  prices; CNY is the only billing currency. Flagship models (GLM-4.5-Air, GLM-4.7,
  GLM-5 series) have tiered pricing by input/output length; prices shown are for the
  cheapest tier ([0, 32k) input / [0, 0.2k) output where applicable). GLM-4 standard
  inference models (GLM-4-Air, GLM-4-Plus, etc.) bill input and output tokens at the
  same per-token rate per their pricing page. Cache write is temporarily free for
  flagship models (limited-time promotion, not included).
model_match:
  or:
    - starts_with: "GLM-"
    - starts_with: "glm-"
extractors:
  - api_flavor: chat
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
      - path: [prompt_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens

models:
  - id: GLM-4-Air
    name: GLM-4-Air
    description: >-
      High-performance GLM-4 model with context caching. 128,000 token context window.
      Input and output billed at the same per-token rate.
    match:
      or:
        - equals: GLM-4-Air
        - equals: glm-4-air
    context_window: 128000
    prices_checked: "2026-05-23"
    prices:
      input_mtok: 0.069
      cache_read_mtok: 0.034
      output_mtok: 0.069

  - id: GLM-4-AirX
    name: GLM-4-AirX
    description: >-
      Fastest GLM-4 model. 8,000 token context window. Does not support context
      caching. Input and output billed at the same per-token rate.
    match:
      or:
        - equals: GLM-4-AirX
        - equals: glm-4-airx
    context_window: 8000
    prices_checked: "2026-05-23"
    prices:
      input_mtok: 1.379
      output_mtok: 1.379

  - id: GLM-4-Assistant
    name: GLM-4-Assistant
