# yaml-language-server: $schema=.schema.json
name: Zhipu AI
id: zhipuai
pricing_urls:
  - https://open.bigmodel.cn/pricing
  - https://docs.bigmodel.cn/cn/guide/start/model-overview
api_pattern: 'https://open\.bigmodel\.cn'
price_comments: >-
  Prices sourced from Zhipu AI open platform pricing (CNY), converted to USD at
  1 USD = 7.25 CNY (May 2026). GLM pricing is tiered by input length; these
  prices apply to the [0, 32k) input token tier. Longer context inputs are
  priced higher. Native CNY prices: GLM-5.1 input 6¥/M, output 24¥/M,
  cache_read 1.3¥/M; GLM-5 input 4¥/M, output 18¥/M, cache_read 1¥/M.
model_match:
  or:
    - starts_with: "glm-5"
    - starts_with: "GLM-5"
extractors:
  - api_flavor: chat
    root: usage
    mappings:
      - path: prompt_tokens
        dest: input_tokens
      - path: [prompt_tokens_details, cached_tokens]
        dest: cache_read_tokens
        required: false
      - path: completion_tokens
        dest: output_tokens

models:
  - id: GLM-5
    name: GLM-5
    description: >-
      Zhipu AI's capable general-purpose model. Supports function calling and
      context caching. 200,000 token context window.
    match:
      or:
        - equals: GLM-5
        - equals: glm-5
    context_window: 200000
    prices_checked: "2026-05-22"
    prices:
      input_mtok: 0.552
      cache_read_mtok: 0.138
      output_mtok: 2.483

  - id: GLM-5.1
    name: GLM-5.1
    description: >-
      Zhipu AI's latest flagship model. Supports deep thinking, structured output,
      function calling, and context caching. 200,000 token context window.
    match:
      or:
        - equals: GLM-5.1
        - equals: glm-5.1
    context_window: 200000
    prices_checked: "2026-05-22"
    prices:
      input_mtok: 0.828
      cache_read_mtok: 0.179
      output_mtok: 3.310
