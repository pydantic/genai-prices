# yaml-language-server: $schema=.schema.json
name: Cohere
id: cohere
pricing_urls:
  - https://cohere.com/pricing
api_pattern: 'https://api\.cohere\.(?:ai|com)'
model_match:
  starts_with: "command-"
provider_match:
  contains: cohere
extractors:
  # https://github.com/cohere-ai/cohere-python/blob/5.16.3/src/cohere/types/usage.py#L13
  # and https://github.com/cohere-ai/cohere-python/blob/5.16.3/src/cohere/types/usage_billed_units.py
  - root: [usage, billed_units]
    mappings:
      - path: input_tokens
        dest: input_tokens
      - path: output_tokens
        dest: output_tokens
  # https://github.com/cohere-ai/cohere-python/blob/5.16.3/src/cohere/types/usage.py#L14
  # and https://github.com/cohere-ai/cohere-python/blob/5.16.3/src/cohere/types/usage_tokens.py
  - api_flavor: tokens
    root: usage
    mappings:
      - path: [tokens, input_tokens]
        dest: input_tokens
        required: false
      - path: [tokens, output_tokens]
        dest: output_tokens
        required: false
      # Assumes tokens.input_tokens includes cached tokens (Cohere docs do not specify).
      # Currently price-neutral: no Cohere model has cache_read_mtok pricing. Revisit if that changes.
      - path: cached_tokens
        dest: cache_read_tokens
        required: false
  # https://github.com/cohere-ai/cohere-python/blob/v5.16.3/src/cohere/types/embed_by_type_response.py#L30
  # and https://github.com/cohere-ai/cohere-python/blob/v5.16.3/src/cohere/types/api_meta.py#L15
  # and https://github.com/cohere-ai/cohere-python/blob/v5.16.3/src/cohere/types/api_meta_billed_units.py
  - api_flavor: embeddings
    root: [meta, billed_units]
    mappings:
      - path: input_tokens
        dest: input_tokens

models:
  - id: c4ai-aya-expanse-32b
    name: Aya Expanse 32B
    description: >-
      Aya Expanse is a highly performant 32B multilingual model, designed to rival monolingual performance through
      innovations in instruction tuning with data arbitrage, preference training, and model merging. Serves 23 languages.
    match:
      contains: aya-expanse-32b
    context_window: 128000
    prices_checked: 2026-07-20
    price_comments: >-
      https://cohere.com/pricing FAQ: Aya Expanse models (8B and 32B) on the API are charged at $0.50/1M tokens
      for input and $1.50/1M tokens for output.
    prices:
      input_mtok: 0.5
      output_mtok: 1.5

  - id: c4ai-aya-expanse-8b
    name: Aya Expanse 8B
    description: >-
      Aya Expanse is a highly performant 8B multilingual model, designed to rival monolingual performance through
      innovations in instruction tuning with data arbitrage, preference training, and model merging. Serves 23 languages.
    match:
      contains: aya-expanse-8b
    context_window: 8192
    deprecated: true
    prices_checked: 2026-07-20
    price_comments: >-
      Retired 2026-04-04 per https://docs.cohere.com/docs/models; last published price kept for historical usage.
      https://cohere.com/pricing FAQ: Aya Expanse models (8B and 32B) on the API are charged at $0.50/1M tokens
      for input and $1.50/1M tokens for output.
    prices:
      input_mtok: 0.5
      output_mtok: 1.5

  - id: command
    name: Command
    description: >-
      Command is an instruction-following conversational model that performs language tasks with high quality, more reliably
      and with a longer context than our base generative models.
    match:
      equals: command
    prices:
      input_mtok: 1
      output_mtok: 2

  - id: command-a
    name: Command A
    description: >-
      Command A is an open-weights 111B parameter model with a 256k context window focused on delivering great performance
      across agentic, multilingual, and coding use cases.

      Compared to other leading proprietary and open-weights models Command A delivers maximum performance with minimum hardware
      costs, excelling on business-critical agentic and multilingual tasks.
    match:
      starts_with: command-a
    prices_checked: 2025-07-04
    prices:
      input_mtok: 2.5
      output_mtok: 10

  - id: command-light
    name: Command Light
    description: >-
      A smaller, faster version of Command. Almost as capable, but a lot faster.
    match:
      starts_with: command-light
    context_window: 4096
    deprecated: true
    prices_checked: 2026-07-20
    price_comments: >-
      Deprecated 2025-09-15 per https://docs.cohere.com/docs/models; still billable for existing customers.
      https://cohere.com/pricing FAQ: Command-light pricing is $0.30/1M tokens for input and $0.60/1M tokens for output.
    prices:
      input_mtok: 0.3
      output_mtok: 0.6

  - id: command-r
    name: Command R
    description: >-
      Command-R is a 35B parameter model that performs conversational language tasks at a higher quality, more reliably, and
      with a longer context than previous models. It can be used for complex workflows
      like code generation, retrieval augmented generation (RAG), tool use, and agents.
    match:
      or:
        - equals: command-r
        - equals: command-r-08-2024
    prices_checked: 2025-07-04
    prices:
      input_mtok: 0.15
      output_mtok: 0.6

  - id: command-r-plus
    name: Command R+
    description: >-
      Command R+ is a new, 104B-parameter LLM from Cohere. It's useful for roleplay, general consumer usecases, and Retrieval
      Augmented Generation (RAG).
    match:
      or:
        - equals: command-r-plus
        - equals: command-r-plus-08-2024
    prices_checked: 2025-07-04
    prices:
      input_mtok: 2.5
      output_mtok: 10

  - id: command-r7b
    name: Command R7B
    description: >-
      Command R7B (12-2024) is a small, fast update of the Command R+ model, delivered in December 2024. It excels at RAG,
      tool use, agents, and similar tasks requiring complex reasoning and multiple steps.
    match:
      or:
        - equals: command-r7b
        - equals: command-r7b-12-2024
    prices_checked: 2025-07-04
    prices:
      input_mtok: 0.0375
      output_mtok: 0.15

  - id: embed-v4.0
    name: Embed v4.0
    description: >-
      Embed v4.0 is a state-of-the-art embedding model designed for precise retrieval across noisy, multilingual, and multimodal data.
    match:
      equals: embed-v4.0
    context_window: 128000
    prices_checked: 2025-12-10
    prices:
      input_mtok: 0.12
