name: CI
on:
  push:
    branches:
      - main
    tags:
      - "**"
  pull_request: {}

permissions:
  contents: read

env:
  COLUMNS: 150
  UV_PYTHON: 3.13
  UV_FROZEN: "1"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
      - run: uv sync  --all-packages
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
      - run: npm install
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.UV_PYTHON }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uvx pre-commit run --color=always --all-files --verbose
        env:
          SKIP: no-commit-to-branch

  test-python:
    name: test py${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
      - run: uv sync --frozen --all-packages --all-extras
      - run: make test
        env:
          COVERAGE_FILE: coverage/.coverage.py${{ matrix.python-version }}
      - name: store coverage files
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage
          include-hidden-files: true
      - name: test with lowest dependency version
        run: |
          uv sync --all-packages --all-extras --resolution lowest-direct
          uv run --no-sync pytest -m "not requires_latest_pydantic"

  coverage:
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # needed for diff-cover
          fetch-depth: 0
      - name: get coverage files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: coverage
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
      - run: uv sync --only-dev
      - run: uv run coverage combine coverage
      - run: uv run coverage html --show-contexts --title "genai-prices coverage for ${{ github.sha }}"
      - name: Store coverage html
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: htmlcov
          include-hidden-files: true
      - run: uv run coverage report --fail-under 100

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: "npm" # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions

      - run: npm install

      - run: npm run ci

  # Fail the PR if the package version is decreased relative to the base branch,
  # or if the python/js version files disagree. Guards against an old release-prep
  # commit being accidentally replayed onto an advanced `main` (see PR #428).
  version-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # fetch the base branch too so we can read its version
          fetch-depth: 0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true # zizmor: ignore[cache-poisoning] -- Job does not produce release artifacts and does not have sensitive permissions
      - run: uv sync --only-dev
      - run: uv run --no-sync python .github/scripts/check_version_not_downgraded.py "${BASE_SHA}"
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

  # https://github.com/marketplace/actions/alls-green#why used for branch protection checks
  check:
    if: always()
    needs: [pre-commit, test-python, coverage, test-js, version-guard]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # version-guard only runs on pull_request; it is (correctly) skipped on
          # push/tag runs, so don't let that skip fail the gate.
          allowed-skips: version-guard

  release-pypi:
    needs: [check]
    # Not success(): version-guard is skipped on tag runs, and a skipped job anywhere
    # in the needs chain makes success() false, silently skipping the release jobs
    # (the v0.0.70 tag hit this). An explicit status function is required, otherwise
    # an implicit success() is still applied to the expression.
    if: ${{ !cancelled() && needs.check.result == 'success' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment:
      name: release-pypi
      url: https://pypi.org/project/genai-prices/${{ steps.check-package-version.outputs.VERSION }}
    permissions:
      id-token: write
    outputs:
      package-version: ${{ steps.check-python-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - id: check-package-version
        uses: samuelcolvin/check-python-version@ee87cddb8049d2694cc03badc8569765a05cef00 # v5
        with:
          version_file_path: packages/python/pyproject.toml

      - run: uv build --package genai-prices

      - run: uv publish --trusted-publishing always

  release-npm:
    needs: [check]
    # Not success(): version-guard is skipped on tag runs, and a skipped job anywhere
    # in the needs chain makes success() false, silently skipping the release jobs
    # (the v0.0.70 tag hit this). An explicit status function is required, otherwise
    # an implicit success() is still applied to the expression.
    if: ${{ !cancelled() && needs.check.result == 'success' && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    environment:
      name: release-npm
      url: https://www.npmjs.com/package/@pydantic/genai-prices/v/${{ steps.check-package-version.outputs.VERSION }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - id: check-package-version
        uses: samuelcolvin/check-python-version@ee87cddb8049d2694cc03badc8569765a05cef00 # v5
        with:
          version_file_path: packages/js/package.json
          version_pattern: '"version": *"(?P<version>.+?)"'

      - run: npm ci
      - run: npm run build --workspace=packages/js
      - run: npm publish --workspace=packages/js
